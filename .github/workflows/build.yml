# FloatTask 云端编译工作流
# 推代码到 GitHub 后，GitHub Actions 自动编译生成 Windows .msi 安装包
# 下载地址：https://github.com/<你的用户名>/<仓库名>/actions

name: Build FloatTask

on:
  push:
    tags: ['v*']   # 推送 v1.0.0 等 tag 时触发
  workflow_dispatch: # 也可手动在 Actions 页面点 Run 触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target (MSVC)
        run: rustup target add x86_64-pc-windows-msvc

      - name: Generate placeholder icon (if no icon exists)
        shell: powershell
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            Write-Host "No icon found, generating a simple placeholder..."
            # 用 PowerShell 生成一个 32x32 的简单 ICO 占位文件
            # 避免因缺少图标导致 tauri build 失败
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap(32, 32)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::Transparent)
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(80, 140, 255))
            $g.FillEllipse($brush, (New-Object System.Drawing.Rectangle(4, 4, 24, 24)))
            $g.Dispose()
            $bmp.Save("src-tauri/icons/icon.ico", [System.Drawing.Imaging.ImageFormat]::Icon)
            $bmp.Dispose()
            Write-Host "Placeholder icon generated."
          } else {
            Write-Host "Icon already exists, skipping."
          }

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend + Tauri
        run: pnpm tauri build

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatTask-msi
          path: src-tauri/target/msi/*.msi

      - name: Upload .exe (NSIS) artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatTask-exe
          path: src-tauri/target/nsis/*.exe
