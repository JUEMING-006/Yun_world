name: Build FloatTask

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - run: rustup target add x86_64-pc-windows-msvc

      - name: Generate placeholder icon
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap(32, 32)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::Transparent)
            $c = [System.Drawing.Color]::FromArgb(80, 140, 255)
            $b = New-Object System.Drawing.SolidBrush($c)
            $g.FillEllipse($b, (New-Object System.Drawing.Rectangle(4, 4, 24, 24)))
            $g.Dispose()
            $bmp.Save("src-tauri/icons/icon.ico", [System.Drawing.Imaging.ImageFormat]::Icon)
            $bmp.Dispose()
          }

      - name: Install dependencies (npm)
        run: npm install --prefix .

      - name: Build
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: FloatTask-msi
          path: src-tauri/target/msi/*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: FloatTask-exe
          path: src-tauri/target/nsis/*.exe
